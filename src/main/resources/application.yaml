spring:
  application:
    name: spring.kt
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/exploring}
    username: ${DB_USERNAME:exploring}
    password: ${DB_PASSWORD:exploring}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
